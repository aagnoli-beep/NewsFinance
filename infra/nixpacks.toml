# Nixpacks build config per il backend Python su Railway.
# Specifica versione Python e dipendenze di sistema (asyncpg ha bisogno di libpq).
[phases.setup]
nixPkgs = ["python312", "gcc", "postgresql.lib"]

[phases.install]
cmds = [
  "pip install uv",
  "cd backend && uv sync --frozen"
]

[phases.build]
cmds = ["cd backend && uv run alembic upgrade head"]

[start]
cmd = "cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
