# Railway service config per il backend FastAPI.
# Root Directory deve essere impostato a "backend" nel dashboard Railway.
# Nixpacks rileva uv.lock e usa uv automaticamente per le dipendenze Python.

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
